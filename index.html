<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dr. Alejandro Salazar Rodríguez — Psiquiatra & TCC · CDMX</title>
<meta name="ext-resource-dependency" content="./assets/logo.png" data-resource-id="logoImg" />
<meta name="ext-resource-dependency" content="./assets/fotoperfil.jpg" data-resource-id="fotoPerfilImg" />
<template id="__bundler_thumbnail" data-bg-color="#F7F4EE">
  <svg viewBox="0 0 1200 800" xmlns="http://www.w3.org/2000/svg">
    <!-- Nav bar -->
    <rect x="0" y="0" width="1200" height="72" fill="#F7F4EE"/>
    <rect x="48" y="24" width="36" height="24" rx="4" fill="#1B2E5E" opacity="0.15"/>
    <rect x="96" y="30" width="120" height="10" rx="3" fill="#1B2E5E" opacity="0.25"/>
    <rect x="980" y="26" width="120" height="20" rx="5" fill="#1B2E5E"/>
    <!-- Hero left -->
    <rect x="48" y="120" width="60" height="8" rx="3" fill="#B8A882" opacity="0.8"/>
    <rect x="48" y="148" width="440" height="52" rx="6" fill="#1B2E5E"/>
    <rect x="48" y="212" width="380" height="52" rx="6" fill="#1B2E5E" opacity="0.7"/>
    <rect x="48" y="276" width="300" height="52" rx="6" fill="#1B2E5E" opacity="0.5"/>
    <rect x="48" y="360" width="420" height="24" rx="4" fill="#374151" opacity="0.3"/>
    <rect x="48" y="394" width="380" height="24" rx="4" fill="#374151" opacity="0.2"/>
    <rect x="48" y="460" width="160" height="44" rx="6" fill="#1B2E5E"/>
    <rect x="224" y="460" width="140" height="44" rx="6" fill="none" stroke="#1B2E5E" stroke-width="2"/>
    <!-- Hero right: photo placeholder -->
    <rect x="600" y="72" width="600" height="728" fill="#D6D0C8"/>
    <circle cx="900" cy="360" r="200" fill="#C4BDB4" opacity="0.5"/>
    <!-- Stats -->
    <rect x="48" y="560" width="60" height="36" rx="4" fill="#1B2E5E" opacity="0.8"/>
    <rect x="128" y="560" width="60" height="36" rx="4" fill="#1B2E5E" opacity="0.8"/>
    <rect x="208" y="560" width="60" height="36" rx="4" fill="#1B2E5E" opacity="0.8"/>
  </svg>
</template>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;1,400;1,500&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,300;1,9..40,400&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  html { scroll-behavior: smooth; }
  body { background: #F7F4EE; -webkit-font-smoothing: antialiased; overflow-x: hidden; }
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: #F7F4EE; }
  ::-webkit-scrollbar-thumb { background: #C9C3B8; border-radius: 3px; }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel" src="Header.jsx"></script>
<script type="text/babel" src="Sections.jsx"></script>

<script type="text/babel">
const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "accentColor": "#1B2E5E",
  "warmAccent": "#B8A882",
  "heroLayout": "split",
  "showPublications": false,
  "ctaText": "Agenda tu cita"
}/*EDITMODE-END*/;

function App() {
  const [tweaks, setTweaks] = React.useState(TWEAK_DEFAULTS);
  const [showTweaks, setShowTweaks] = React.useState(false);
  const [activeSection, setActiveSection] = React.useState('hero');

  // Tweaks protocol
  React.useEffect(() => {
    window.addEventListener('message', e => {
      if (e.data?.type === '__activate_edit_mode')   setShowTweaks(true);
      if (e.data?.type === '__deactivate_edit_mode') setShowTweaks(false);
    });
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
  }, []);

  // Restore scroll position
  React.useEffect(() => {
    const saved = localStorage.getItem('salazar-scroll');
    if (saved) window.scrollTo(0, parseInt(saved));
    const onScroll = () => localStorage.setItem('salazar-scroll', window.scrollY);
    window.addEventListener('scroll', onScroll);
    return () => window.removeEventListener('scroll', onScroll);
  }, []);

  // Active section tracking
  React.useEffect(() => {
    const observer = new IntersectionObserver(entries => {
      entries.forEach(e => { if (e.isIntersecting) setActiveSection(e.target.id); });
    }, { threshold: 0.3 });
    document.querySelectorAll('section[id]').forEach(s => observer.observe(s));
    return () => observer.disconnect();
  }, []);

  function applyTweak(key, val) {
    const next = { ...tweaks, [key]: val };
    setTweaks(next);
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits: { [key]: val } }, '*');
  }

  return (
    <>
      <Nav activeSection={activeSection} />
      <main>
        <Hero />
        <AboutSection />
        <TCCSection />
        <ServicesSection />
        <TestimonialsSection />
        <ContactSection />
      </main>
      <Footer />

      {/* Tweaks Panel */}
      {showTweaks && (
        <div style={{
          position: 'fixed', bottom: 24, right: 24, width: 280,
          background: 'white', borderRadius: 16, boxShadow: '0 8px 48px rgba(0,0,0,0.15)',
          padding: '20px', zIndex: 9999, fontFamily: 'DM Sans, sans-serif'
        }}>
          <div style={{ fontWeight: 600, fontSize: 14, color: '#1B2E5E', marginBottom: 16 }}>Tweaks</div>

          <div style={{ marginBottom: 14 }}>
            <label style={{ fontSize: 12, color: '#6B7280', display: 'block', marginBottom: 6 }}>Color principal</label>
            <div style={{ display: 'flex', gap: 8 }}>
              {['#1B2E5E','#2C4A7C','#1A3D36','#3D1A36'].map(c => (
                <div key={c} onClick={() => applyTweak('accentColor', c)} style={{
                  width: 28, height: 28, background: c, borderRadius: 6, cursor: 'pointer',
                  border: tweaks.accentColor === c ? '2px solid #B8A882' : '2px solid transparent'
                }} />
              ))}
            </div>
          </div>

          <div style={{ marginBottom: 14 }}>
            <label style={{ fontSize: 12, color: '#6B7280', display: 'block', marginBottom: 6 }}>Acento cálido</label>
            <div style={{ display: 'flex', gap: 8 }}>
              {['#B8A882','#C9A96E','#A89070','#8FA89A'].map(c => (
                <div key={c} onClick={() => applyTweak('warmAccent', c)} style={{
                  width: 28, height: 28, background: c, borderRadius: 6, cursor: 'pointer',
                  border: tweaks.warmAccent === c ? '2px solid #1B2E5E' : '2px solid transparent'
                }} />
              ))}
            </div>
          </div>

          <div style={{ marginBottom: 14 }}>
            <label style={{ fontSize: 12, color: '#6B7280', display: 'block', marginBottom: 6 }}>Texto CTA principal</label>
            <input value={tweaks.ctaText} onChange={e => applyTweak('ctaText', e.target.value)}
              style={{ width: '100%', padding: '7px 10px', borderRadius: 6, border: '1px solid #E2DDD4', fontSize: 13, fontFamily: 'DM Sans, sans-serif', color: '#1B2E5E', outline: 'none' }} />
          </div>

          <div>
            <label style={{ fontSize: 12, color: '#6B7280', display: 'block', marginBottom: 6 }}>Publicaciones</label>
            <div style={{ display: 'flex', gap: 8 }}>
              {[['Mostrar', true],['Ocultar', false]].map(([l, v]) => (
                <button key={l} onClick={() => applyTweak('showPublications', v)} style={{
                  flex: 1, padding: '6px', borderRadius: 6, border: '1.5px solid',
                  borderColor: tweaks.showPublications === v ? '#1B2E5E' : '#E2DDD4',
                  background: tweaks.showPublications === v ? '#1B2E5E' : 'white',
                  color: tweaks.showPublications === v ? 'white' : '#6B7280',
                  fontSize: 12, cursor: 'pointer', fontFamily: 'DM Sans, sans-serif'
                }}>{l}</button>
              ))}
            </div>
          </div>
        </div>
      )}
    </>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
